<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FERRARI 2026 | CONCEPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { margin: 0; background: #000; overflow-x: hidden; font-family: 'JetBrains+Mono', monospace; color: white; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }
        .scroll-section { height: 100vh; position: relative; z-index: 2; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .loading-screen { position: fixed; inset: 0; background: black; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 1s; }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="text-center">
            <h1 class="text-2xl font-black italic mb-2 tracking-tighter">SCUDERIA FERRARI</h1>
            <p class="text-[10px] animate-pulse opacity-50 uppercase tracking-widest">Initialising 2026 Power Unit...</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <!-- HUD -->
    <div class="fixed inset-0 z-50 pointer-events-none p-8 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div id="header">
                <h1 class="text-5xl md:text-8xl font-black italic tracking-tighter leading-none">FERRARI<br><span class="text-[#D40000]">2026</span></h1>
                <p class="text-[10px] mt-4 tracking-[0.4em] uppercase opacity-40">System: Virtual Wind Tunnel v4.4</p>
            </div>
            <div class="glass p-6 text-[10px] hidden md:block border-red-900/30">
                <p class="text-red-500 mb-1">● LIVE TELEMETRY</p>
                <p>MGU-K: ACTIVE</p>
                <p>DRS: STANDBY</p>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-end gap-10">
            <div id="info-card" class="glass p-8 w-full md:w-96 border-white/5 transition-all duration-1000 translate-y-10 opacity-0">
                <p class="text-[9px] text-red-500 font-bold uppercase mb-4 tracking-widest">Technical Specification</p>
                <h2 id="comp-name" class="text-3xl font-black italic mb-3">CHASSIS 01</h2>
                <p id="comp-desc" class="text-[11px] leading-relaxed opacity-50 font-light">Loading component data...</p>
            </div>
            <p class="text-[8px] opacity-20">CONCEPT BY PRINCIPAL ARCHITECT | NOT AFFILIATED WITH FERRARI S.P.A.</p>
        </div>
    </div>

    <!-- 8 SCROLL SECTIONS -->
    <div class="scroll-section"></div><div class="scroll-section"></div><div class="scroll-section"></div>
    <div class="scroll-section"></div><div class="scroll-section"></div><div class="scroll-section"></div>
    <div class="scroll-section"></div><div class="scroll-section"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.exposure = 1.5;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x000000, 0.5);
        scene.add(hemiLight);
        const spot = new THREE.SpotLight(0xffffff, 10);
        spot.position.set(10, 15, 10);
        scene.add(spot);

        // 2. LOAD HIGH-REALISM MODEL
        let car;
        const loader = new GLTFLoader();
        // Loading a public F1 car model
        loader.load('https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/f1-car/model.gltf', (gltf) => {
            car = gltf.scene;
            
            // Apply Rosso Corsa Paint to the Body
            car.traverse((node) => {
                if (node.isMesh) {
                    node.material = new THREE.MeshPhysicalMaterial({
                        color: "#D40000",
                        metalness: 0.9,
                        roughness: 0.1,
                        clearcoat: 1.0
                    });
                }
            });

            scene.add(car);
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 1000);
        });

        // 3. ANIMATION MATRIX
        gsap.registerPlugin(ScrollTrigger);
        
        const states = [
            { pos: [8, 2, 10], look: [0,0,0], name: "ROSSO CORSA 2026", desc: "The future of Scuderia Ferrari. Advanced carbon-titanium monocoque architecture." },
            { pos: [0, 2, -6], look: [0,1,-3], name: "REAR WING ASSEMBLY", desc: "Active aero components designed to maximize downforce while reducing turbulent wake." },
            { pos: [0, 0.5, 6], look: [0,0,3], name: "FRONT DOWNFORCE", desc: "Complex 5-element wing structure with integrated brake duct cooling vents." },
            { pos: [4, 0.5, 3], look: [2,0,3], name: "TYRE SYSTEM", desc: "Pirelli 18-inch soft compounds with intelligent sensor arrays." },
            { pos: [0, 1.5, 0.5], look: [0,0.8,1], name: "THE COCKPIT", desc: "Custom seat molded to Sir Lewis Hamilton's biometric data." },
            { pos: [2, 1.8, -2], look: [0,1,-1], name: "IDENTITY 44", desc: "A new era begins. Seven-time champion meets the most iconic brand." },
            { pos: [0, 4, 0], look: [0,0,0], name: "POWER UNIT", desc: "V6 Turbo Hybrid with 50% electric power deployment (2026 Regs)." },
            { pos: [12, 1, 0], look: [0,0,0], name: "READY TO RACE", desc: "Mission Winnow. Forza Ferrari." }
        ];

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5,
                onUpdate: (self) => {
                    const i = Math.min(Math.floor(self.progress * 8), 7);
                    document.getElementById('comp-name').innerText = states[i].name;
                    document.getElementById('comp-desc').innerText = states[i].desc;
                    document.getElementById('info-card').style.opacity = 1;
                    document.getElementById('info-card').style.transform = "translateY(0)";
                }
            }
        });

        camera.position.set(8, 2, 10);

        states.forEach((s, idx) => {
            tl.to(camera.position, { x: s.pos[0], y: s.pos[1], z: s.pos[2], duration: 2 }, idx * 2);
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
  </html>
